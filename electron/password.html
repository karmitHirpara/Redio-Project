<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redio</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 18px; background: #0b0b0c; color: #f2f2f2; }
      h1 { font-size: 16px; margin: 0 0 10px 0; }
      p { margin: 0 0 14px 0; font-size: 12px; color: #cfcfcf; line-height: 1.4; }
      input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid #2a2a2a; background: #121214; color: #fff; font-size: 14px; }
      .row { display: flex; gap: 10px; margin-top: 12px; }
      button { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #2a2a2a; background: #1b1b1f; color: #fff; font-size: 14px; cursor: pointer; }
      button.primary { background: #2563eb; border-color: #2563eb; }
      .error { margin-top: 10px; font-size: 12px; color: #ffb4b4; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>License Password Required</h1>
    <p>This license is protected. Enter the password provided by your vendor to continue.</p>
    <input id="pw" type="password" autocomplete="current-password" placeholder="Password" />
    <div class="row">
      <button id="cancel">Quit</button>
      <button id="unlock" class="primary">Unlock</button>
    </div>
    <div id="err" class="error"></div>
    <script>
      const pw = document.getElementById('pw');
      const err = document.getElementById('err');
      const cancel = document.getElementById('cancel');
      const unlock = document.getElementById('unlock');

      function submit() {
        err.textContent = '';
        const val = String(pw.value || '');
        window.redioPassword.submit(val);
      }

      cancel.addEventListener('click', () => window.redioPassword.cancel());
      unlock.addEventListener('click', submit);
      pw.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
      });

      window.redioPassword.onError((m) => {
        err.textContent = String(m || 'Invalid password');
        pw.focus();
        pw.select();
      });

      pw.focus();
    </script>
  </body>
</html>
